name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - name: Run statix
        run: nix develop --command statix check .
      - name: Run deadnix
        run: nix develop --command deadnix .
      - name: Run shellcheck
        run: nix develop --command shellcheck --severity=warning tests/*.sh

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - name: Build mcp-android
        run: nix build .#mcp-android
      - name: Build mcp-browser
        run: nix build .#mcp-browser
      - name: Build test-app-android
        run: nix build .#test-app-android
      - name: Build test-app-web
        run: nix build .#test-app-web

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - name: Build mcp-ios
        run: nix build .#mcp-ios

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - name: Run smoke tests
        run: nix flake check

  e2e-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Build test prerequisites
        run: |
          nix build .#test-app-android .#mcp-android
      - name: Run Android E2E tests
        run: |
          export TEST_APK_PATH=$(nix build .#test-app-android --print-out-paths)/test-app-android.apk
          export PATH="$(nix build .#mcp-android --print-out-paths)/bin:$PATH"
          nix develop --command bash tests/android-e2e.sh
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-logs
          path: test-logs/
      - name: Verify non-vacuous results
        run: |
          test -f test-logs/android/summary.json
          pass=$(jq '.pass' test-logs/android/summary.json)
          echo "Android E2E pass count: $pass"
          test "$pass" -gt 0

  e2e-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - name: Build test prerequisites
        run: |
          nix build .#test-app-web .#mcp-browser
      - name: Run Chromium E2E tests
        run: |
          export TEST_WEB_DIR=$(nix build .#test-app-web --print-out-paths)
          export PATH="$(nix build .#mcp-browser --print-out-paths)/bin:$PATH"
          nix develop --command bash tests/browser-e2e.sh
        env:
          PLAYWRIGHT_CHROMIUM_SANDBOX: "0"
      - name: Verify Chromium non-vacuous results
        run: |
          test -f test-logs/browser/summary.json
          pass=$(jq '.pass' test-logs/browser/summary.json)
          echo "Browser (Chromium) E2E pass count: $pass"
          test "$pass" -gt 0
      - name: Run Firefox + WebKit E2E tests
        run: |
          export TEST_WEB_DIR=$(nix build .#test-app-web --print-out-paths)
          export PATH="$(nix build .#mcp-browser --print-out-paths)/bin:$PATH"
          nix develop --command bash tests/browser-e2e-all.sh
        env:
          PLAYWRIGHT_CHROMIUM_SANDBOX: "0"
      - name: Verify Firefox non-vacuous results
        run: |
          test -f test-logs/browser-firefox/summary.json
          pass=$(jq '.pass' test-logs/browser-firefox/summary.json)
          echo "Browser (Firefox) E2E pass count: $pass"
          test "$pass" -gt 0
      - name: Verify WebKit non-vacuous results
        run: |
          test -f test-logs/browser-webkit/summary.json
          pass=$(jq '.pass' test-logs/browser-webkit/summary.json)
          echo "Browser (WebKit) E2E pass count: $pass"
          test "$pass" -gt 0
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-e2e-logs
          path: test-logs/

  e2e-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
      - name: Build test prerequisites
        run: |
          nix build .#mcp-ios
      - name: Run iOS E2E tests
        run: |
          export PATH="$(nix build .#mcp-ios --print-out-paths)/bin:$PATH"
          nix develop --command bash tests/ios-e2e.sh
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-e2e-logs
          path: test-logs/
      - name: Verify non-vacuous results
        run: |
          test -f test-logs/ios/summary.json
          pass=$(jq '.pass' test-logs/ios/summary.json)
          echo "iOS E2E pass count: $pass"
          test "$pass" -gt 0

  security-gitleaks:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source=. --report-format=sarif --report-path=gitleaks-results.sarif
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true
      - name: Save JSON output
        if: always()
        run: |
          mkdir -p test-logs/security
          if [ -f gitleaks-results.sarif ]; then
            cp gitleaks-results.sarif test-logs/security/gitleaks.sarif.json
          else
            echo '{"$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"gitleaks","version":"1.0"}},"results":[]}]}' > test-logs/security/gitleaks.sarif.json
          fi
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: test-logs/security/gitleaks.sarif.json
          category: gitleaks
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-gitleaks-logs
          path: test-logs/security/
      - name: Verify non-vacuous output
        if: always()
        run: |
          test -f test-logs/security/gitleaks.sarif.json
          size=$(wc -c < test-logs/security/gitleaks.sarif.json)
          echo "Gitleaks output size: $size bytes"
          test "$size" -gt 0

  security-trivy:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
      - name: Save JSON output
        if: always()
        run: |
          mkdir -p test-logs/security
          if [ -f trivy-results.sarif ]; then
            cp trivy-results.sarif test-logs/security/trivy.sarif.json
          else
            echo '{"$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"trivy","version":"1.0"}},"results":[]}]}' > test-logs/security/trivy.sarif.json
          fi
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: test-logs/security/trivy.sarif.json
          category: trivy
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-trivy-logs
          path: test-logs/security/
      - name: Verify non-vacuous output
        if: always()
        run: |
          test -f test-logs/security/trivy.sarif.json
          size=$(wc -c < test-logs/security/trivy.sarif.json)
          echo "Trivy output size: $size bytes"
          test "$size" -gt 0

  security-semgrep:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: semgrep scan --config=p/default --sarif --output=semgrep-results.sarif .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true
      - name: Save JSON output
        if: always()
        run: |
          mkdir -p test-logs/security
          if [ -f semgrep-results.sarif ]; then
            cp semgrep-results.sarif test-logs/security/semgrep.sarif.json
          else
            echo '{"$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"semgrep","version":"1.0"}},"results":[]}]}' > test-logs/security/semgrep.sarif.json
          fi
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: test-logs/security/semgrep.sarif.json
          category: semgrep
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-semgrep-logs
          path: test-logs/security/
      - name: Verify non-vacuous output
        if: always()
        run: |
          test -f test-logs/security/semgrep.sarif.json
          size=$(wc -c < test-logs/security/semgrep.sarif.json)
          echo "Semgrep output size: $size bytes"
          test "$size" -gt 0

  security-snyk:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Snyk
        uses: snyk/actions/setup@master
      - name: Run Snyk test
        if: env.SNYK_TOKEN != ''
        run: |
          mkdir -p test-logs/security
          snyk test --all-projects --sarif-file-output=test-logs/security/snyk.sarif.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - name: Run Snyk monitor (main branch only)
        if: github.ref == 'refs/heads/main' && env.SNYK_TOKEN != ''
        run: snyk monitor --all-projects || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - name: Ensure output exists
        if: always()
        run: |
          mkdir -p test-logs/security
          if [ ! -f test-logs/security/snyk.sarif.json ]; then
            echo '{"$schema":"https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"snyk","version":"1.0"}},"results":[]}]}' > test-logs/security/snyk.sarif.json
          fi
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: test-logs/security/snyk.sarif.json
          category: snyk
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-snyk-logs
          path: test-logs/security/
      - name: Verify non-vacuous output
        if: always()
        run: |
          test -f test-logs/security/snyk.sarif.json
          size=$(wc -c < test-logs/security/snyk.sarif.json)
          echo "Snyk output size: $size bytes"
          test "$size" -gt 0

  security-sonarcloud:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Save scan metadata
        if: always()
        run: |
          mkdir -p test-logs/security
          echo "{\"scanner\":\"sonarcloud\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"status\":\"completed\"}" > test-logs/security/sonarcloud.json
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-sonarcloud-logs
          path: test-logs/security/
      - name: Verify non-vacuous output
        if: always()
        run: |
          test -f test-logs/security/sonarcloud.json
          size=$(wc -c < test-logs/security/sonarcloud.json)
          echo "SonarCloud output size: $size bytes"
          test "$size" -gt 0
